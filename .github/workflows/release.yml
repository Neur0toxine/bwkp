name: Release Artifacts
on:
  push:
    tags: ["v*"]
  workflow_call:
    inputs:
      tag:
        description: Release tag to build.
        required: true
        type: string
permissions:
  contents: write
  id-token: write
  attestations: write
env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
jobs:
  prepare:
    runs-on: ubuntu-24.04
    steps:
      - name: Create a draft release when the tag was pushed manually
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            exit 0
          fi
          gh release create "$RELEASE_TAG" --draft --generate-notes --title "$RELEASE_TAG"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - {runner: ubuntu-24.04, target: linux-i686, binary: bwkp, mage-target: build, dependencies: linux}
          - {runner: ubuntu-24.04, target: linux-amd64, binary: bwkp, mage-target: build, dependencies: linux}
          - {runner: ubuntu-24.04-arm, target: linux-arm64, binary: bwkp, mage-target: build, dependencies: linux}
          - {runner: macos-15-intel, target: macos-amd64, binary: bwkp, mage-target: build, dependencies: macos}
          - {runner: macos-15, target: macos-arm64, binary: bwkp, mage-target: build, dependencies: macos}
          - {runner: ubuntu-24.04, target: android-arm64, binary: bwkp-android-arm64, mage-target: "android:arm64", dependencies: android}
          - {runner: ubuntu-24.04, target: android-armv7, binary: bwkp-android-armv7, mage-target: "android:armv7", dependencies: android}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with: {ref: "${{ env.RELEASE_TAG }}"}
      - uses: actions/setup-go@v7
        with: {go-version-file: go.mod, cache: true}
      - uses: dtolnay/rust-toolchain@stable
        with: {toolchain: 1.93.1}
      - if: matrix.target == 'linux-i686'
        uses: dtolnay/rust-toolchain@stable
        with: {toolchain: 1.93.1, targets: i686-unknown-linux-gnu}
      - if: matrix.dependencies == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes binutils cmake curl file g++ make pkg-config python3
      - if: matrix.target == 'linux-i686'
        run: sudo apt-get install --yes g++-multilib
      - if: matrix.dependencies == 'macos'
        run: |
          brew install cmake pkgconf
      - if: matrix.dependencies != 'macos'
        run: |
          build/install-upx.sh "$RUNNER_TEMP/upx"
          echo "$RUNNER_TEMP/upx" >> "$GITHUB_PATH"
      - shell: bash
        run: |
          if [[ "${{ matrix.target }}" == linux-i686 ]]; then
            export GOOS=linux GOARCH=386 CARGO_BUILD_TARGET=i686-unknown-linux-gnu
            export CFLAGS=-m32 CXXFLAGS=-m32 LDFLAGS=-m32
          fi
          VERSION="${RELEASE_TAG#v}" COMMIT="$GITHUB_SHA" BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" go tool mage ${{ matrix.mage-target }}
          mkdir package
          cp "dist/${{ matrix.binary }}" package/bwkp
          cp README.md LICENSE.md package/
          tar -C package -czf "bwkp_${RELEASE_TAG}_${{ matrix.target }}.tar.gz" .
      - uses: actions/attest-build-provenance@v2
        with: {subject-path: "bwkp_*.tar.gz"}
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: "bwkp_*.tar.gz"

  build-windows:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2025
            target: windows-386
            goarch: "386"
            rust-target: i686-pc-windows-gnu
            msystem: MINGW32
            cc: gcc
            cxx: g++
            packages: >-
              mingw-w64-i686-toolchain mingw-w64-i686-cmake mingw-w64-i686-ninja mingw-w64-i686-python
          - runner: windows-2025
            target: windows-amd64
            goarch: amd64
            rust-target: x86_64-pc-windows-gnu
            msystem: MINGW64
            cc: gcc
            cxx: g++
            packages: >-
              mingw-w64-x86_64-toolchain mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja
              mingw-w64-x86_64-python mingw-w64-x86_64-qt5-static
          - runner: windows-11-arm
            target: windows-arm64
            goarch: arm64
            rust-target: aarch64-pc-windows-gnullvm
            msystem: CLANGARM64
            cc: clang
            cxx: clang++
            packages: >-
              mingw-w64-clang-aarch64-toolchain mingw-w64-clang-aarch64-cmake mingw-w64-clang-aarch64-ninja
              mingw-w64-clang-aarch64-python mingw-w64-clang-aarch64-qt5-static
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with: {ref: "${{ env.RELEASE_TAG }}"}
      - uses: actions/setup-go@v7
        with: {go-version-file: go.mod, cache: true}
      - uses: dtolnay/rust-toolchain@stable
        with: {toolchain: 1.93.1, targets: "${{ matrix.rust-target }}"}
      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: ${{ matrix.packages }}
          path-type: inherit
      - shell: msys2 {0}
        env:
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          CARGO_BUILD_TARGET: ${{ matrix.rust-target }}
          VERSION: ${{ env.RELEASE_TAG }}
          COMMIT: ${{ github.sha }}
        run: |
          VERSION="${VERSION#v}" BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" go tool mage build
          mkdir package
          cp dist/bwkp.exe package/
          cp README.md LICENSE.md package/
          tar -C package -czf "bwkp_${RELEASE_TAG}_${{ matrix.target }}.tar.gz" .
          file package/bwkp.exe
          package/bwkp.exe version
      - uses: actions/attest-build-provenance@v2
        with: {subject-path: "bwkp_*.tar.gz"}
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: "bwkp_*.tar.gz"

  checksums:
    needs: [build, build-windows]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with: {ref: master}
      - uses: robinraju/release-downloader@v1
        with: {tag: "${{ env.RELEASE_TAG }}", fileName: "bwkp_*.tar.gz"}
      - run: sha256sum bwkp_*.tar.gz > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: SHA256SUMS
      - name: Update Homebrew cask
        env:
          VERSION: ${{ env.RELEASE_TAG }}
        run: |
          arm64_sha256=$(awk '$2 ~ /_macos-arm64\.tar\.gz$/ { print $1 }' SHA256SUMS)
          amd64_sha256=$(awk '$2 ~ /_macos-amd64\.tar\.gz$/ { print $1 }' SHA256SUMS)
          build/update-homebrew-cask.sh "${VERSION#v}" "$arm64_sha256" "$amd64_sha256"
          if git diff --quiet -- Casks/bwkp.rb; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Casks/bwkp.rb
          git commit -m "chore: update Homebrew cask for $VERSION [skip ci]"
          git push origin HEAD:master
      - name: Publish the completed release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$RELEASE_TAG" --draft=false
