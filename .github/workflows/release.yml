name: Release Artifacts
on:
  release:
    types: [published]
permissions:
  contents: write
  id-token: write
  attestations: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - {runner: ubuntu-24.04, target: linux-amd64, binary: bwkp, mage-target: build, dependencies: linux}
          - {runner: ubuntu-24.04-arm, target: linux-arm64, binary: bwkp, mage-target: build, dependencies: linux}
          - {runner: macos-15-intel, target: macos-amd64, binary: bwkp, mage-target: build, dependencies: macos}
          - {runner: macos-14, target: macos-arm64, binary: bwkp, mage-target: build, dependencies: macos}
          - {runner: ubuntu-24.04, target: android-arm64, binary: bwkp-android-arm64, mage-target: "android:arm64", dependencies: android}
          - {runner: ubuntu-24.04, target: android-armv7, binary: bwkp-android-armv7, mage-target: "android:armv7", dependencies: android}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with: {go-version-file: go.mod, cache: true}
      - uses: dtolnay/rust-toolchain@stable
        with: {toolchain: 1.93.1}
      - if: matrix.dependencies == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes cmake g++ pkg-config qtbase5-dev qttools5-dev \
            libqt5svg5-dev libbotan-2-dev libargon2-dev libminizip-dev libqrencode-dev
      - if: matrix.dependencies == 'macos'
        run: |
          brew install cmake qt@5 botan argon2 minizip qrencode
          echo "PKG_CONFIG_PATH=$(brew --prefix qt@5)/lib/pkgconfig:$(brew --prefix botan)/lib/pkgconfig:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"
      - if: matrix.dependencies != 'macos'
        run: |
          build/install-upx.sh "$RUNNER_TEMP/upx"
          echo "$RUNNER_TEMP/upx" >> "$GITHUB_PATH"
      - shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}" COMMIT="$GITHUB_SHA" BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" go tool mage ${{ matrix.mage-target }}
          mkdir package
          cp "dist/${{ matrix.binary }}" package/bwkp
          cp README.md LICENSE.md package/
          tar -C package -czf "bwkp_${GITHUB_REF_NAME}_${{ matrix.target }}.tar.gz" .
      - uses: actions/attest-build-provenance@v2
        with: {subject-path: "bwkp_*.tar.gz"}
      - uses: softprops/action-gh-release@v2
        with: {files: "bwkp_*.tar.gz"}

  build-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2025
            target: windows-386
            goarch: "386"
            rust-target: i686-pc-windows-gnu
            msystem: MINGW32
            cc: /opt/bwkp-gcc14/mingw32/bin/gcc.exe
            cxx: /opt/bwkp-gcc14/mingw32/bin/g++.exe
            gcc-runtime-dir: /opt/bwkp-gcc14/mingw32/bin
            library-path: /opt/bwkp-gcc14/mingw32/lib:/mingw32/lib
            archived-x86-dependencies: true
            packages: >-
              mingw-w64-i686-toolchain mingw-w64-i686-cmake mingw-w64-i686-ninja
              mingw-w64-i686-minizip mingw-w64-i686-zlib
          - runner: windows-2025
            target: windows-amd64
            goarch: amd64
            rust-target: x86_64-pc-windows-gnu
            msystem: MINGW64
            cc: gcc
            cxx: g++
            packages: >-
              mingw-w64-x86_64-toolchain mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja
              mingw-w64-x86_64-qt5-base mingw-w64-x86_64-qt5-tools mingw-w64-x86_64-qt5-svg
              mingw-w64-x86_64-libbotan mingw-w64-x86_64-argon2 mingw-w64-x86_64-minizip
              mingw-w64-x86_64-qrencode mingw-w64-x86_64-zlib
          - runner: windows-11-arm
            target: windows-arm64
            goarch: arm64
            rust-target: aarch64-pc-windows-gnullvm
            msystem: CLANGARM64
            cc: clang
            cxx: clang++
            packages: >-
              mingw-w64-clang-aarch64-toolchain mingw-w64-clang-aarch64-cmake mingw-w64-clang-aarch64-ninja
              mingw-w64-clang-aarch64-qt5-base mingw-w64-clang-aarch64-qt5-tools mingw-w64-clang-aarch64-qt5-svg
              mingw-w64-clang-aarch64-libbotan mingw-w64-clang-aarch64-argon2 mingw-w64-clang-aarch64-minizip
              mingw-w64-clang-aarch64-qrencode mingw-w64-clang-aarch64-zlib
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with: {go-version-file: go.mod, cache: true}
      - uses: dtolnay/rust-toolchain@stable
        with: {toolchain: 1.93.1, targets: "${{ matrix.rust-target }}"}
      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: ${{ matrix.packages }}
          path-type: inherit
      - if: matrix.archived-x86-dependencies
        shell: msys2 {0}
        run: build/install-msys2-x86-dependencies.sh
      - shell: msys2 {0}
        env:
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          BWKP_WINDOWS_GCC_RUNTIME_DIR: ${{ matrix.gcc-runtime-dir }}
          LIBRARY_PATH: ${{ matrix.library-path }}
          CARGO_BUILD_TARGET: ${{ matrix.rust-target }}
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          VERSION="${VERSION#v}" BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" go tool mage build
          build/collect-windows-runtime.sh dist/bwkp.exe package
          cp README.md LICENSE.md package/
          tar -C package -czf "bwkp_${{ github.ref_name }}_${{ matrix.target }}.tar.gz" .
          file package/bwkp.exe
          package/bwkp.exe version
      - uses: actions/attest-build-provenance@v2
        with: {subject-path: "bwkp_*.tar.gz"}
      - uses: softprops/action-gh-release@v2
        with: {files: "bwkp_*.tar.gz"}

  checksums:
    needs: [build, build-windows]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with: {ref: master}
      - uses: robinraju/release-downloader@v1
        with: {tag: "${{ github.ref_name }}", fileName: "bwkp_*.tar.gz"}
      - run: sha256sum bwkp_*.tar.gz > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with: {files: SHA256SUMS}
      - name: Update Homebrew cask
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          arm64_sha256=$(awk '$2 ~ /_macos-arm64\.tar\.gz$/ { print $1 }' SHA256SUMS)
          amd64_sha256=$(awk '$2 ~ /_macos-amd64\.tar\.gz$/ { print $1 }' SHA256SUMS)
          build/update-homebrew-cask.sh "${VERSION#v}" "$arm64_sha256" "$amd64_sha256"
          if git diff --quiet -- Casks/bwkp.rb; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Casks/bwkp.rb
          git commit -m "chore: update Homebrew cask for $VERSION [skip ci]"
          git push origin HEAD:master
