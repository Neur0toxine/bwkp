name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with: {go-version-file: go.mod, cache: true}
      - uses: dtolnay/rust-toolchain@stable
        with: {toolchain: 1.93.1, components: "rustfmt, clippy"}
      - run: go tool mage test:unit coverage
      - uses: golangci/golangci-lint-action@v8
        with: {version: v2.12.2}

  rust:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with: {toolchain: 1.93.1, components: "rustfmt, clippy"}
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --locked --workspace --all-targets -- -D warnings
      - run: cargo test --locked --workspace --exclude bwkp-e2e-register

  android:
    strategy:
      fail-fast: false
      matrix:
        include:
          - {target: arm64, mage-target: "android:arm64"}
          - {target: armv7, mage-target: "android:armv7"}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with: {go-version-file: go.mod, cache: true}
      - run: go tool mage ${{ matrix.mage-target }}
      - run: file dist/bwkp-android-${{ matrix.target }}

  linux:
    name: linux (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: i686
            goarch: "386"
            rust-target: i686-unknown-linux-gnu
            cflags: -m32
            packages: g++-multilib
          - runner: ubuntu-24.04
            arch: amd64
            goarch: amd64
            rust-target: x86_64-unknown-linux-gnu
            cflags: ""
            packages: g++
          - runner: ubuntu-24.04-arm
            arch: aarch64
            goarch: arm64
            rust-target: aarch64-unknown-linux-gnu
            cflags: ""
            packages: g++
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with: {go-version-file: go.mod, cache: true}
      - uses: dtolnay/rust-toolchain@stable
        with: {toolchain: 1.93.1, targets: "${{ matrix.rust-target }}"}
      - run: |
          sudo apt-get update
          sudo apt-get install --yes binutils cmake curl file make pkg-config python3 ${{ matrix.packages }}
      - env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CARGO_BUILD_TARGET: ${{ matrix.rust-target }}
          CFLAGS: ${{ matrix.cflags }}
          CXXFLAGS: ${{ matrix.cflags }}
          LDFLAGS: ${{ matrix.cflags }}
          BWKP_UPX: "0"
        run: |
          go tool mage build
          file dist/bwkp
          dist/bwkp version

  macos:
    strategy:
      fail-fast: false
      matrix:
        runner: [macos-15-intel, macos-15]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with: {go-version-file: go.mod, cache: true}
      - uses: dtolnay/rust-toolchain@stable
        with: {toolchain: 1.93.1}
      - run: brew install cmake pkgconf
      - run: go tool mage build
      - run: |
          file dist/bwkp
          dist/bwkp version
          otool -L dist/bwkp
          brew tap Neur0toxine/bwkp "$GITHUB_WORKSPACE"
          brew audit --strict --cask Neur0toxine/bwkp/bwkp

  windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2025
            goarch: "386"
            rust-target: i686-pc-windows-gnu
            msystem: MINGW32
            cc: gcc
            cxx: g++
            packages: >-
              mingw-w64-i686-toolchain mingw-w64-i686-cmake mingw-w64-i686-ninja mingw-w64-i686-python
          - runner: windows-2025
            goarch: amd64
            rust-target: x86_64-pc-windows-gnu
            msystem: MINGW64
            cc: gcc
            cxx: g++
            packages: >-
              mingw-w64-x86_64-toolchain mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja
              mingw-w64-x86_64-python mingw-w64-x86_64-qt5-static
          - runner: windows-11-arm
            goarch: arm64
            rust-target: aarch64-pc-windows-gnullvm
            msystem: CLANGARM64
            cc: clang
            cxx: clang++
            packages: >-
              mingw-w64-clang-aarch64-toolchain mingw-w64-clang-aarch64-cmake mingw-w64-clang-aarch64-ninja
              mingw-w64-clang-aarch64-python mingw-w64-clang-aarch64-qt5-static
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with: {go-version-file: go.mod, cache: true}
      - uses: dtolnay/rust-toolchain@stable
        with: {toolchain: 1.93.1, targets: "${{ matrix.rust-target }}"}
      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: ${{ matrix.packages }}
          path-type: inherit
      - shell: msys2 {0}
        env:
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          CARGO_BUILD_TARGET: ${{ matrix.rust-target }}
          BWKP_UPX: "0"
        run: |
          go tool mage build
          file dist/bwkp.exe
          dist/bwkp.exe version

  e2e:
    runs-on: ubuntu-24.04
    env:
      CMAKE_BUILD_PARALLEL_LEVEL: "2"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with: {go-version-file: go.mod, cache: true}
      - uses: actions/setup-node@v7
        with: {node-version: 24}
      - uses: dtolnay/rust-toolchain@stable
        with: {toolchain: 1.93.1}
      - uses: Swatinem/rust-cache@v2
      - run: |
          sudo apt-get update
          sudo apt-get install --yes keepassxc sqlite3 openssh-client binutils cmake curl file g++ make pkg-config python3
      - run: go tool mage test:e2e
